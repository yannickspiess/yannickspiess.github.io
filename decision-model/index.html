<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Model | Yannick Spiess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg-paper: #f6f3ed;
        --bg-shell: #ece7e0;
        --ink: #202125;
        --ink-muted: #50525b;
        --line: #d3cdc5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Source Sans 3", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(130% 90% at 15% 6%, rgba(240, 184, 145, 0.35), transparent 65%),
          radial-gradient(150% 120% at 86% 12%, rgba(114, 129, 158, 0.24), transparent 72%),
          linear-gradient(180deg, var(--bg-paper) 0%, var(--bg-shell) 100%);
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1100px, calc(100% - 2.75rem));
        margin: 0 auto;
        padding: clamp(1.15rem, 2vw, 1.75rem) 0 clamp(2rem, 4vw, 3rem);
      }

      #site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.95rem 0 1.2rem;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        text-decoration: none;
        font-size: clamp(1.4rem, 2vw, 1.8rem);
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .back-link {
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
        color: var(--ink-muted);
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--ink);
      }

      main {
        padding-top: clamp(1rem, 2vw, 1.4rem);
      }

      #app-status,
      #app-error {
        margin: 1rem auto;
        max-width: 720px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.85rem 1rem;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      #app-status {
        color: var(--ink-muted);
        background: rgba(255, 255, 255, 0.52);
      }

      #app-error {
        color: #5d2f2f;
        background: rgba(255, 245, 245, 0.92);
      }

      #app-error a {
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      #site-footer {
        margin-top: clamp(1.8rem, 4vw, 2.6rem);
        padding-top: 1rem;
        border-top: 1px solid var(--line);
      }

      #site-footer p {
        margin: 0;
        color: var(--ink-muted);
        font-size: 0.96rem;
        line-height: 1.6;
      }

      #site-footer a {
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      #site-footer a:hover,
      #site-footer a:focus-visible {
        color: var(--ink);
      }

      @media (max-width: 760px) {
        .page {
          width: min(1100px, calc(100% - 2.4rem));
          padding: 1.4rem 0 2.5rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header id="site-header">
        <a class="brand" href="/">Yannick Spiess</a>
        <a class="back-link" href="/">Back to main page</a>
      </header>

      <main>
        <div id="app-status" role="status" aria-live="polite">Loading Decision Model…</div>
        <div id="app-error" role="alert" hidden></div>
        <div id="decision-model-app" hidden></div>
        <noscript>
          <div id="app-error">
            This page needs JavaScript to render the Decision Model.
          </div>
        </noscript>
      </main>

      <footer id="site-footer">
        <p>
          Return to
          <a href="/">yannickspiess.github.io</a>
        </p>
      </footer>
    </div>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime"
        }
      }
    </script>
    <script type="module">
      const statusEl = document.getElementById("app-status");
      const errorEl = document.getElementById("app-error");
      const mountEl = document.getElementById("decision-model-app");

      function showError(message) {
        statusEl.hidden = true;
        errorEl.hidden = false;
        errorEl.innerHTML =
          "Could not load the local Decision Model app. " +
          "Please try a refresh. If it persists, open " +
          '<a href="/assets/decision-tree-v6.jsx" target="_blank" rel="noopener noreferrer">the source file</a>.' +
          "<br><small>Technical detail: " + message + "</small>";
      }

      async function mountDecisionModel() {
        try {
          const [reactModule, reactDomModule, appModule] = await Promise.all([
            import("react"),
            import("react-dom/client"),
            import("/assets/decision-tree-v6.js"),
          ]);

          if (!appModule || typeof appModule.default !== "function") {
            throw new Error("HourValueApp export missing.");
          }

          statusEl.hidden = true;
          mountEl.hidden = false;
          reactDomModule.createRoot(mountEl).render(reactModule.createElement(appModule.default));
        } catch (err) {
          console.error(err);
          showError(err && err.message ? err.message : "Unknown error");
        }
      }

      mountDecisionModel();
    </script>
  </body>
</html>
