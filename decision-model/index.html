<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Model | Yannick Spiess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg-paper: #f6f3ed;
        --bg-shell: #ece7e0;
        --ink: #202125;
        --ink-muted: #50525b;
        --line: #d3cdc5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Source Sans 3", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(130% 90% at 15% 6%, rgba(240, 184, 145, 0.35), transparent 65%),
          radial-gradient(150% 120% at 86% 12%, rgba(114, 129, 158, 0.24), transparent 72%),
          linear-gradient(180deg, var(--bg-paper) 0%, var(--bg-shell) 100%);
      }

      a {
        color: inherit;
      }

      .page {
        width: min(980px, calc(100% - 2.75rem));
        margin: 0 auto;
        padding: clamp(1.15rem, 2vw, 1.75rem) 0 clamp(2rem, 4vw, 3rem);
      }

      #site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.95rem 0 1.2rem;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        text-decoration: none;
        font-size: clamp(1.4rem, 2vw, 1.8rem);
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .back-link {
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
        color: var(--ink-muted);
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--ink);
      }

      main {
        padding-top: clamp(1.8rem, 3vw, 2.4rem);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.85rem, 4vw, 2.4rem);
        line-height: 1.15;
      }

      .subtitle {
        margin: 0.6rem 0 1.25rem;
        color: var(--ink-muted);
        font-size: 1.04rem;
        line-height: 1.55;
      }

      .embed-shell {
        margin-top: 1rem;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.38);
        overflow: hidden;
        box-shadow: 0 16px 36px rgba(44, 49, 61, 0.09);
      }

      .embed-shell iframe {
        display: block;
        width: 100%;
        height: max(600px, 70vh);
        border: 0;
      }

      #site-footer {
        margin-top: clamp(1.8rem, 4vw, 2.6rem);
        padding-top: 1rem;
        border-top: 1px solid var(--line);
      }

      #site-footer p {
        margin: 0;
        color: var(--ink-muted);
        font-size: 0.96rem;
        line-height: 1.6;
      }

      #site-footer a {
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      #site-footer a:hover,
      #site-footer a:focus-visible {
        color: var(--ink);
      }

      @media (max-width: 760px) {
        .page {
          width: min(980px, calc(100% - 3.2rem));
          padding: 1.75rem 0 3rem;
        }

        .embed-shell iframe {
          height: max(560px, 68vh);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header id="site-header">
        <a class="brand" href="/">Yannick Spiess</a>
        <a class="back-link" href="/">Back to main page</a>
      </header>

      <main>
        <section aria-label="Decision model embed">
          <h1>Decision Model</h1>
          <p class="subtitle">What is an hour of your life worth?</p>
          <div class="embed-shell">
            <iframe
              src="https://claude.site/public/artifacts/171b501f-253f-49c5-ba38-bae35226d605/embed"
              title="Claude Artifact"
              width="100%"
              height="600"
              frameborder="0"
              allow="clipboard-write"
              allowfullscreen
            ></iframe>
          </div>
        </section>
      </main>

      <footer id="site-footer">
        <p>
          Return to
          <a href="/">yannickspiess.github.io</a>
        </p>
      </footer>
    </div>
  </body>
</html>
