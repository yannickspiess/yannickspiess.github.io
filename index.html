<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yannick Spiess | Under Construction</title>
    <style>
      :root {
        color-scheme: light;
        --bg-start: #f7f7f7;
        --bg-end: #e9eef5;
        --text: #1a1a1a;
        --muted: #555;
        --accent: #1f6feb;
        --card: #ffffffcc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: "Avenir Next", Avenir, "Segoe UI", Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, var(--bg-start), var(--bg-end));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
        background: var(--card);
        border: 1px solid #d7dce3;
        border-radius: 20px;
        padding: clamp(24px, 6vw, 48px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      }

      .badge {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #e7f0ff;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.15rem);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Work In Progress</span>
      <h1>YannickSpiess.github.io is under construction.</h1>
      <p>
        A full site is on the way. For now, this page is here to verify GitHub Pages deployment.
      </p>
    </main>
  </body>
</html>
